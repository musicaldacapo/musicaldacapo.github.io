<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Musical da Capo | Stock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{ margin:0; font-family: 'Segoe UI', sans-serif; background:#f4f4f4; padding:15px; }
    .container{ max-width:700px; margin:0 auto; background:#fff; padding:25px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
    h1{ color:#f28c28; text-align:center; font-size: 26px; }
    
    .search-box{ position: sticky; top: 0; background: white; padding-bottom: 10px; z-index: 10; }
    input{ width: 100%; padding:16px; border:2px solid #ddd; border-radius:10px; font-size:18px; box-sizing: border-box; }
    input:focus { border-color: #f28c28; outline: none; }

    /* PANEL DE SUGERENCIAS DINÁMICAS */
    #panel-sugerencias {
      display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0;
    }
    .tag-sugerencia {
      background: #eee; padding: 6px 12px; border-radius: 20px; font-size: 13px; 
      cursor: pointer; font-weight: bold; transition: 0.2s; border: 1px solid #ddd;
    }
    .tag-sugerencia:hover { background: #f28c28; color: white; border-color: #f28c28; }
    .count-badge { background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 10px; margin-left: 5px; font-size: 11px; }

    /* AVISO DE ERROR / CORRECCIÓN */
    #aviso-error{ 
      display:none; background:#fff3e0; border:1px solid #f28c28; 
      padding:15px; border-radius:10px; margin: 15px 0; border-left: 5px solid #f28c28;
    }
    .sugerencia-btn {
      display: inline-block; background: #f28c28; color: white; padding: 8px 15px; 
      border-radius: 6px; cursor: pointer; border: none; font-weight: bold; margin-top: 10px;
    }

    table{ width:100%; border-collapse:collapse; }
    td{ padding:15px 10px; border-bottom:1px solid #eee; }
    .ref-text { color: #999; font-size: 12px; display: block; }
    .status-badge { font-weight: bold; padding: 4px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
    .verde { color: #27ae60; } .rojo { color: #e74c3c; }
    .btn-ws{ background:#25d366; color:#fff; text-decoration:none; padding:8px 12px; border-radius:6px; font-size:12px; font-weight:bold; float:right; }
    .num-badge { background: #eee; color: #666; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 8px; }
  </style>
</head>
<body>

<div class="container">
  <h1>Musical da Capo</h1>
  
  <div class="search-box">
    <input type="text" id="buscador" placeholder="Busca instrumento o referencia..." autocomplete="off" oninput="procesarBusqueda()">
    <div id="panel-sugerencias"></div>
    <div id="aviso-error"></div>
  </div>

  <table>
    <tbody id="tabla">
      <tr><td style="text-align:center; color:#999; padding: 40px;">Cargando inventario...</td></tr>
    </tbody>
  </table>
</div>

<script>
let productos = [];
let ultimosResultadosValidos = [];
let ultimaPalabraValida = "";

fetch('stock.csv')
  .then(res => res.arrayBuffer())
  .then(buffer => {
    const decoder = new TextDecoder('iso-8859-1');
    const lineas = decoder.decode(buffer).split(/\r?\n/).slice(1);
    productos = lineas.map(linea => {
      const c = linea.split(',');
      return c.length >= 3 ? { id: c[0].replace(/"/g, '').trim(), nom: c[1].replace(/"/g, '').trim(), stock: parseInt(c[2]) || 0 } : null;
    }).filter(p => p);
    document.getElementById('tabla').innerHTML = '<tr><td style="text-align:center; color:#999;">Escribe para empezar...</td></tr>';
  });

function limpiar(t) { return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); }

function procesarBusqueda() {
  const input = document.getElementById('buscador').value;
  const textoLimpio = limpiar(input);
  const aviso = document.getElementById('aviso-error');
  const panelSug = document.getElementById('panel-sugerencias');
  
  if (textoLimpio.length < 2) {
    aviso.style.display = 'none';
    panelSug.innerHTML = '';
    dibujar([]);
    return;
  }

  const palabrasBusqueda = textoLimpio.split(/\s+/).filter(p => p.length > 0);

  let actuales = productos.filter(p => {
    const n = limpiar(p.nom);
    const id = limpiar(p.id);
    return palabrasBusqueda.every(pal => n.includes(pal) || id.includes(pal));
  }).sort((a, b) => b.stock - a.stock);

  if (actuales.length > 0) {
    ultimosResultadosValidos = actuales;
    ultimaPalabraValida = input;
    aviso.style.display = 'none';
    generarTagsSugerencias(actuales);
    dibujar(actuales);
  } else {
    panelSug.innerHTML = '';
    if (ultimosResultadosValidos.length > 0) {
      aviso.style.display = 'block';
      let corregida = ultimosResultadosValidos[0].nom.split(" ")[0].toUpperCase();
      aviso.innerHTML = `
        <div>No hay resultados para "<strong>${input}</strong>".</div>
        <button class="sugerencia-btn" onclick="sobrescribir('${corregida}')">¿Quisiste decir ${corregida}?</button>
      `;
      dibujar(ultimosResultadosValidos);
    }
  }
}

function generarTagsSugerencias(lista) {
  const panel = document.getElementById('panel-sugerencias');
  const conteo = {};
  
  // Agrupamos por la primera palabra para crear categorías rápidas
  lista.forEach(p => {
    let cat = p.nom.split(" ")[0].toUpperCase();
    conteo[cat] = (conteo[cat] || 0) + 1;
  });

  const topCategorias = Object.entries(conteo)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5);

  panel.innerHTML = topCategorias.map(([nom, num]) => `
    <div class="tag-sugerencia" onclick="sobrescribir('${nom}')">
      ${nom} <span class="count-badge">${num}</span>
    </div>
  `).join('');
}

function sobrescribir(palabra) {
  document.getElementById('buscador').value = palabra;
  document.getElementById('aviso-error').style.display = 'none';
  procesarBusqueda();
}

function dibujar(lista) {
  const cuerpo = document.getElementById('tabla');
  if (lista.length === 0) { cuerpo.innerHTML = ''; return; }
  
  cuerpo.innerHTML = lista.slice(0, 40).map((p, i) => {
    let st = p.stock > 0 ? 'verde' : 'rojo';
    let txt = p.stock > 0 ? 'Disponible' : 'Agotado';
    return `<tr>
      <td><span class="num-badge">${i+1}</span><strong>${p.nom}</strong><span class="ref-text">Ref: ${p.id}</span></td>
      <td style="text-align:right"><span class="status-badge ${st}">${txt}</span>
      <a href="https://wa.me/34695908361?text=Me interesa: ${p.nom}" target="_blank" class="btn-ws">WhatsApp</a></td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
