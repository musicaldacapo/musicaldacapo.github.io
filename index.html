<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Musical da Capo | Stock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{ margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background:#f4f4f4; color:#333; padding:15px; }
    .container{ max-width:600px; margin:0 auto; background:#fff; padding:20px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
    h1{ color:#f28c28; text-align:center; font-size:24px; margin-bottom: 20px; }
    
    .search-box{ position: sticky; top: 0; background: white; padding: 10px 0; z-index: 10; }
    input{ width: 100%; padding:14px; border:2px solid #eee; border-radius:8px; font-size:16px; box-sizing: border-box; }
    input:focus { border-color: #f28c28; outline: none; }
    
    #aviso-error{ 
      display:none; background:#fff3e0; border:1px solid #f28c28; 
      padding:10px; border-radius:8px; margin: 10px 0; color: #d35400; font-size: 14px;
    }
    
    table{ width:100%; border-collapse:collapse; margin-top: 10px; }
    td{ padding:15px 10px; border-bottom:1px solid #eee; font-size: 15px; }
    .ref-text { color: #888; font-size: 12px; font-family: monospace; display: block; margin-top: 4px; }
    .status-badge { font-weight: bold; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .verde { color: #27ae60; }
    .rojo { color: #e74c3c; }
    .btn-ws{ background:#25d366; color:#fff; text-decoration:none; padding:6px 12px; border-radius:6px; font-size:12px; font-weight:bold; float:right; }

    .sugerencia-item { cursor: pointer; padding: 5px; border-radius: 4px; transition: background 0.2s; }
    .sugerencia-item:hover { background: #fdf2e9; }
  </style>
</head>
<body>

<div class="container">
  <h1>Musical da Capo</h1>
  
  <div class="search-box">
    <input type="text" id="buscador" placeholder="Escribe castauñela..." autocomplete="off" oninput="procesarBusqueda()">
    <div id="aviso-error"></div>
  </div>

  <table>
    <tbody id="tabla">
      <tr><td style="text-align:center; color:#999;">Cargando productos...</td></tr>
    </tbody>
  </table>
</div>

<script>
let productos = [];
let ultimosResultadosValidos = [];
let ultimaPalabraValida = "";

// 1. CARGA DEL CSV (Con comas)
fetch('stock.csv')
  .then(res => res.arrayBuffer())
  .then(buffer => {
    const decoder = new TextDecoder('iso-8859-1');
    const texto = decoder.decode(buffer);
    const lineas = texto.split(/\r?\n/).slice(1);
    
    productos = lineas.map(linea => {
      const c = linea.split(','); // Tu CSV usa comas
      if (c.length >= 3) {
        return {
          id: c[0].replace(/"/g, '').trim(),
          nom: c[1].replace(/"/g, '').trim(),
          stock: parseInt(c[2]) || 0
        };
      }
      return null;
    }).filter(p => p !== null);

    document.getElementById('tabla').innerHTML = '<tr><td style="text-align:center">Empieza a escribir para buscar...</td></tr>';
  });

function limpiar(t) {
  return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}

// 2. LÓGICA DE MEMORIA Y ACTUALIZACIÓN AUTOMÁTICA
function procesarBusqueda() {
  const input = document.getElementById('buscador').value;
  const busq = limpiar(input);
  const aviso = document.getElementById('aviso-error');
  
  if (busq.length < 2) {
    aviso.style.display = 'none';
    dibujar([]);
    ultimosResultadosValidos = [];
    ultimaPalabraValida = "";
    return;
  }

  // Filtrar productos con el texto actual
  let actuales = productos.filter(p => 
    limpiar(p.nom).includes(busq) || limpiar(p.id).includes(busq)
  );

  if (actuales.length > 0) {
    // Si hay resultados, guardamos este estado como el "último bueno"
    ultimosResultadosValidos = actuales;
    ultimaPalabraValida = input;
    aviso.style.display = 'none';
    dibujar(actuales);
  } else {
    // SI NO HAY RESULTADOS (porque una letra baila)
    if (ultimosResultadosValidos.length > 0) {
      aviso.style.display = 'block';
      // Tomamos el nombre del primer resultado válido como sugerencia para sobrescribir
      let sugerencia = ultimosResultadosValidos[0].nom;
      
      aviso.innerHTML = `
        <div class="sugerencia-item" onclick="sobrescribir('${sugerencia}')">
          No hay resultados para "<strong>${input}</strong>". <br>
          Mostrando resultados de "<strong>${ultimaPalabraValida}</strong>". 
          <br><small>¿Quisiste decir <strong>${sugerencia}</strong>? Pulsa aquí.</small>
        </div>`;
      
      // Mantenemos en pantalla los últimos resultados que sí funcionaron
      dibujar(ultimosResultadosValidos);
    } else {
      document.getElementById('tabla').innerHTML = '<tr><td>No se encontró nada.</td></tr>';
    }
  }
}

function sobrescribir(nombre) {
  document.getElementById('buscador').value = nombre;
  document.getElementById('aviso-error').style.display = 'none';
  procesarBusqueda(); // Volver a filtrar con el nombre correcto
}

function dibujar(lista) {
  const cuerpo = document.getElementById('tabla');
  if (lista.length === 0) {
    cuerpo.innerHTML = '<tr><td style="text-align:center; color:#999">Escribe una palabra más larga...</td></tr>';
    return;
  }
  
  cuerpo.innerHTML = lista.slice(0, 30).map(p => {
    let disp = p.stock > 0 ? '<span class="status-badge verde">Disponible</span>' : '<span class="status-badge rojo">Agotado</span>';
    let link = `https://wa.me/34695908361?text=Hola, precio y stock de: ${p.nom} (${p.id})`;
    return `<tr>
      <td>
        <strong>${p.nom}</strong>
        <span class="ref-text">Ref: ${p.id}</span>
      </td>
      <td style="min-width: 100px; text-align: right;">
        ${disp}
        <a href="${link}" target="_blank" class="btn-ws">WhatsApp</a>
      </td>
    </tr>`;
  }).join('');
}
</script>

</body>
</html>
