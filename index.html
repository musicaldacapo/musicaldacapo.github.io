<script>
  let productos = [];

  // Lógica del buscador de Stock con validación
  fetch('stock.csv')
    .then(response => {
      // Si el archivo no existe o hay error, lanzamos error para no procesar basura
      if (!response.ok) throw new Error('Archivo no encontrado');
      return response.text();
    })
    .then(data => {
      const filas = data.trim().split('\n').slice(1);
      productos = filas.map(f => {
        const c = f.split(',');
        // Aseguramos que existan las columnas antes de mapear
        if (c.length >= 3) {
          return { nombre: c[1].trim(), stock: parseInt(c[2]) };
        }
        return null;
      }).filter(p => p && p.nombre); // Filtramos nulos y filas sin nombre
      
      renderTabla(productos);
    })
    .catch(err => {
      console.log("Esperando archivo stock.csv...");
      // Opcional: mostrar un mensaje en la tabla si quieres
      // document.getElementById('cuerpoTabla').innerHTML = '<tr><td colspan="2">Cargando inventario...</td></tr>';
    });

  function renderTabla(lista) {
    const cuerpo = document.getElementById('cuerpoTabla');
    if (lista.length === 0) {
      cuerpo.innerHTML = '';
      return;
    }
    cuerpo.innerHTML = lista.map(p => {
      let clase = 'rojo', texto = 'Agotado';
      if (p.stock > 5) { clase = 'verde'; texto = 'Stock disponible'; }
      else if (p.stock > 0) { clase = 'amarillo'; texto = 'Últimas unidades'; }
      return `<tr><td>${p.nombre}</td><td class="${clase}">${texto}</td></tr>`;
    }).join('');
  }

  function filtrarStock() {
    const busqueda = document.getElementById('buscador').value.toLowerCase();
    const filtrados = productos.filter(p => p.nombre.toLowerCase().includes(busqueda));
    renderTabla(filtrados);
  }

  // Funciones originales
  function loadMap(){
    document.getElementById("mapShell").innerHTML = `<iframe class="map" loading="lazy" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6297.279991449915!2d-4.781773223665278!3d37.892101005392185!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd6cdf7aaf6b856d%3A0xa2a0162c1597d138!2sMusical%20da%20Capo!5e0!3m2!1ses!2ses!4v1766014231271!5m2!1ses!2ses"></iframe>`;
  }
  document.getElementById("year").textContent = new Date().getFullYear();
</script>
