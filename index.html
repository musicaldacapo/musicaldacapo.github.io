<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Musical da Capo | Tienda de música en Córdoba</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* --- DISEÑO ORIGINAL RECUPERADO --- */
    body{ margin:0; font-family: Arial, sans-serif; background:#f6f6f6; color:#222; }
    .container{ max-width:900px; margin:20px auto; background:#fff; padding:24px; border-radius:14px; box-shadow:0 8px 26px rgba(0,0,0,.12); }
    .logo{ display:block; margin:0 auto 10px; max-width:320px; width:100%; height: auto; }
    h1{ text-align:center; color:#f28c28; margin:10px 0 5px; font-size:30px; }
    .subtitle{ text-align:center; font-size:18px; margin-bottom:16px; }
    .xmas{ background:#178a3a; color:#fff; text-align:center; padding:10px; border-radius:10px; font-weight:bold; margin-bottom:18px; }
    
    .info{ text-align:center; font-size:15px; line-height:1.5; margin-bottom:18px; }
    .info strong{ color:#1f6feb; }

    .buttons{ text-align:center; margin-bottom:20px; }
    .buttons a{ display:inline-block; margin:6px; padding:11px 16px; border-radius:10px; color:#fff; text-decoration:none; font-weight:bold; cursor: pointer; }
    .whatsapp{ background:#25d366; } .email{ background:#1f6feb; } .maps{ background:#f28c28; } .review{ background:#d72638; }

    /* --- NAVEGACIÓN --- */
    .nav-articulos { text-align: center; margin-bottom: 25px; }
    .dropdown { position: relative; display: inline-block; }
    .dropbtn { background: #333; color: white; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 16px; }
    .dropdown-content { display: none; position: absolute; background-color: #fff; min-width: 200px; box-shadow: 0px 8px 16px rgba(0,0,0,0.15); z-index: 10; border-radius: 8px; text-align: left; left: 50%; transform: translateX(-50%); }
    .dropdown-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; border-bottom: 1px solid #eee; }
    .dropdown-content a:hover { background-color: #f28c28; color: white; }
    .dropdown:hover .dropdown-content { display: block; }

    /* --- BUSCADOR Y TABLA --- */
    .stock-container { margin: 25px 0; padding: 20px; border: 2px solid #f28c28; border-radius: 12px; background: #fffcf9; }
    .stock-title { color: #f28c28; font-weight: bold; margin-bottom: 10px; text-align: center; }
    .search-box { display: flex; gap: 8px; margin-bottom: 10px; }
    #buscador { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    .btn-buscar-main { background: #333; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

    #contenedor-sugerencias { background: white; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; display: none; padding: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .sugerencia-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .sugerencia-item:hover { background: #fff8f0; }

    .tabla-wrapper { max-height: 450px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #f28c28; color: white; padding: 12px; position: sticky; top: 0; text-align: left; }
    td { padding: 12px; border-bottom: 1px solid #eee; background: #fff; }

    .verde { color: #27ae60; font-weight: bold; }
    .amarillo { color: #f39c12; font-weight: bold; }
    .rojo { color: #e74c3c; font-weight: bold; }
    .btn-ws-tabla { background: #25d366; color: white !important; text-decoration: none; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; display: inline-block; margin-left: 5px; }

    #landing-producto { display: none; border-top: 2px solid #f28c28; padding-top: 20px; margin-top: 20px; }
    .btn-volver { background: #eee; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; }

    footer { text-align: center; font-size: 12px; color: #888; margin-top: 30px; }

    @media (max-width: 600px) {
      .search-box { flex-direction: column; }
      thead { display: none; }
      tr { display: block; border-bottom: 2px solid #f28c28; padding: 10px 0; }
      td { display: block; padding: 5px 10px; }
      td:nth-child(2) { font-weight: bold; font-size: 16px; }
    }
  </style>
</head>
<body>

<div class="container">
  <img src="logo-musical.png" alt="Musical da Capo" class="logo">
  <h1>Musical da Capo</h1>
  <div class="subtitle">Tu tienda de Música en Córdoba</div>
  
  <div class="nav-articulos">
    <div class="dropdown">
      <button class="dropbtn">Ver Instrumentos en Stock ▼</button>
      <div class="dropdown-content">
        <a href="#" onclick="mostrarLanding('Guitarras', 'Selección de guitarras españolas y acústicas.')">Guitarras</a>
        <a href="#" onclick="mostrarLanding('Ukeleles', 'Ukeleles de todas las gamas.')">Ukeleles</a>
        <a href="#" onclick="mostrarLanding('Teclados', 'Pianos y teclados digitales.')">Teclados</a>
      </div>
    </div>
  </div>

  <div class="xmas">¡Hola amantes de la música!</div>
  
  <div id="landing-producto"></div>

  <div id="main-content">
    <div class="info">
      <p>Avenida de los Molinos 8, 14001 · Córdoba<br>
      <strong>WhatsApp (24h): 695 90 83 61</strong></p>
    </div>

    <div class="buttons">
      <a class="whatsapp" href="https://wa.me/34695908361" target="_blank">WhatsApp</a>
      <a class="maps" href="https://maps.app.goo.gl/..." target="_blank">Cómo llegar</a>
    </div>

    <div class="stock-container">
      <div class="stock-title">🔎 CONSULTAR STOCK DISPONIBLE</div>
      <div class="search-box">
        <input type="text" id="buscador" placeholder="Escribe castauñela o guitara..." oninput="manejarInput()">
        <button class="btn-buscar-main" onclick="filtrarStock()">BUSCAR</button>
      </div>
      <div id="contenedor-sugerencias"></div>
      
      <div style="margin-bottom: 10px; font-size: 14px;">
        <label><input type="checkbox" id="soloStock" onclick="filtrarStock()"> Solo productos con stock</label>
      </div>

      <div class="tabla-wrapper" id="ancla-resultados">
        <table>
          <thead><tr><th>Código</th><th>Producto</th><th>Estado</th></tr></thead>
          <tbody id="cuerpoTabla"></tbody>
        </table>
      </div>
    </div>
  </div>

  <footer>© <span id="year"></span> Musical da Capo - Córdoba</footer>
</div>

<script>
  let productos = [];

  // 1. CARGA DE DATOS
  fetch('stock.csv').then(r => r.arrayBuffer()).then(buffer => {
    const decoder = new TextDecoder('iso-8859-1');
    const filas = decoder.decode(buffer).trim().split('\n').slice(1);
    productos = filas.map(f => {
      const c = f.split(',');
      return c.length >= 3 ? {
        codigo: c[0].replace(/"/g, '').trim(),
        nombre: c[1].replace(/"/g, '').trim(),
        stock: parseInt(c[2]) || 0
      } : null;
    }).filter(p => p);
  });

  // 2. UTILIDADES DE TEXTO
  function normalizar(t) {
    return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9 ]/g, "").trim();
  }

  function lev(s1, s2) {
    if (s1.length < s2.length) [s1, s2] = [s2, s1];
    let l1 = s1.length, l2 = s2.length;
    let prev = Array.from({length: l2 + 1}, (_, i) => i);
    for (let i = 0; i < l1; i++) {
      let curr = [i + 1];
      for (let j = 0; j < l2; j++) {
        let cost = s1[i] === s2[j] ? 0 : 1;
        curr.push(Math.min(curr[j] + 1, prev[j + 1] + 1, prev[j] + cost));
      }
      prev = curr;
    }
    return prev[l2];
  }

  // 3. LÓGICA DE BÚSQUEDA
  function manejarInput() {
    const val = normalizar(document.getElementById('buscador').value);
    const sugerencias = document.getElementById('contenedor-sugerencias');
    
    if (val.length < 3) { sugerencias.style.display = 'none'; return; }

    let encontradas = [];
    productos.forEach(p => {
      const n = normalizar(p.nombre);
      const palabras = n.split(" ");
      // Si empieza por lo escrito O si alguna palabra está a 1 letra de distancia
      let coincide = palabras.some(pal => pal.startsWith(val) || (val.length > 4 && lev(val, pal) <= 1));
      
      if (coincide) {
        let frase = p.nombre.split(" ").slice(0, 2).join(" ").toUpperCase();
        if (!encontradas.includes(frase)) encontradas.push(frase);
      }
    });

    if (encontradas.length > 0) {
      sugerencias.style.display = 'block';
      sugerencias.innerHTML = encontradas.slice(0, 4).map(f => 
        `<div class="sugerencia-item" onclick="aplicarSug('${f}')"><span>✨ ${f}</span><small>Ver más</small></div>`
      ).join('');
    } else { sugerencias.style.display = 'none'; }
  }

  function aplicarSug(f) {
    document.getElementById('buscador').value = f;
    document.getElementById('contenedor-sugerencias').style.display = 'none';
    filtrarStock();
  }

  function filtrarStock() {
    const busq = normalizar(document.getElementById('buscador').value);
    const solo = document.getElementById('soloStock').checked;
    if (!busq) { renderTabla([]); return; }

    let filtrados = productos.map(p => {
      const n = normalizar(p.nombre);
      const c = normalizar(p.codigo);
      if (n.includes(busq) || c.includes(busq)) return { ...p, score: 0 };
      
      let minD = 99;
      n.split(" ").forEach(pal => {
        if (pal.length > 3) {
          let d = lev(busq, pal);
          if (d < minD) minD = d;
        }
      });
      if (minD <= (busq.length > 5 ? 2 : 1)) return { ...p, score: minD };
      return null;
    }).filter(p => p && (solo ? p.stock > 0 : true));

    filtrados.sort((a, b) => a.score - b.score || b.stock - a.stock);
    renderTabla(filtrados);
    document.getElementById('contenedor-sugerencias').style.display = 'none';
  }

  function renderTabla(lista) {
    const cuerpo = document.getElementById('cuerpoTabla');
    if (lista.length === 0) {
      cuerpo.innerHTML = '<tr><td colspan="3" style="text-align:center">Escribe algo para buscar</td></tr>';
      return;
    }
    cuerpo.innerHTML = lista.slice(0, 50).map(p => {
      let cl = p.stock > 5 ? 'verde' : (p.stock > 0 ? 'amarillo' : 'rojo');
      let tx = p.stock > 5 ? 'Disponible' : (p.stock > 0 ? 'Últimas unidades' : 'Agotado');
      let msg = encodeURIComponent(`Hola, pregunto por: ${p.nombre}`);
      return `<tr>
        <td style="color:#888; font-family:monospace">${p.codigo}</td>
        <td>${p.nombre}</td>
        <td><span class="${cl}">${tx}</span> <a href="https://wa.me/34695908361?text=${msg}" target="_blank" class="btn-ws-tabla">WhatsApp</a></td>
      </tr>`;
    }).join('');
  }

  function mostrarLanding(t, d) {
    document.getElementById('main-content').style.display = 'none';
    const l = document.getElementById('landing-producto');
    l.style.display = 'block';
    l.innerHTML = `<button class="btn-volver" onclick="cerrarLanding()">← Volver</button><h2>${t}</h2><p>${d}</p><p style="color:#f28c28">Usa el buscador para ver modelos específicos.</p>`;
    window.scrollTo(0,0);
  }

  function cerrarLanding() {
    document.getElementById('main-content').style.display = 'block';
    document.getElementById('landing-producto').style.display = 'none';
  }

  document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
