<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Musical da Capo | Tienda de música en Córdoba</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* MANTENGO TUS ESTILOS ORIGINALES EXACTAMENTE IGUAL */
    body{ margin:0; font-family: Arial, Helvetica, sans-serif; background:#f6f6f6; color:#222; }
    .container{ max-width:900px; margin:20px auto; background:#fff; padding:24px; border-radius:14px; box-shadow:0 8px 26px rgba(0,0,0,.12); }
    .logo{ display:block; margin:0 auto 10px; max-width:320px; width:100%; height: auto; }
    h1{ text-align:center; color:#f28c28; margin:10px 0 5px; font-size:30px; }
    .subtitle{ text-align:center; font-size:18px; margin-bottom:16px; }
    .xmas{ background:#178a3a; color:#fff; text-align:center; padding:10px; border-radius:10px; font-weight:bold; margin-bottom:18px; }
    .info{ text-align:center; font-size:16px; line-height:1.5; margin-bottom:18px; }
    .info strong{color:#1f6feb}
    .buttons{ text-align:center; margin-bottom:20px; }
    .buttons a{ display:inline-block; margin:6px; padding:11px 16px; border-radius:10px; color:#fff; text-decoration:none; font-weight:bold; cursor: pointer; }
    .whatsapp{background:#25d366} .email{background:#1f6feb} .maps{background:#f28c28} .review{ background:#d72638; } 

    /* SECCIÓN DE STOCK Y SUGERENCIAS */
    .stock-container { margin: 25px 0; padding: 20px; border: 2px solid #f28c28; border-radius: 12px; background: #fffcf9; position: relative; }
    .stock-title { color: #f28c28; font-weight: bold; margin-bottom: 10px; text-align: center; }
    #buscador { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
    
    #contenedor-sugerencias { 
        background: white; border: 1px solid #ddd; border-radius: 8px; 
        margin-bottom: 15px; display: none; padding: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .sugerencia-item { 
        display: flex; justify-content: space-between; align-items: center; 
        padding: 8px 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px;
    }
    .btn-buscar-sug { 
        background: #f28c28; color: white; border: none; padding: 6px 12px; 
        border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px;
    }

    .tabla-wrapper { max-height: 400px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; background: #fff; }
    th { background: #f28c28; color: white; padding: 12px 10px; position: sticky; top: 0; text-align: left; z-index: 1; }
    td { padding: 12px 10px; border-bottom: 1px solid #eee; }
    .verde { color: #27ae60; font-weight: bold; }
    .amarillo { color: #f39c12; font-weight: bold; }
    .rojo { color: #e74c3c; font-weight: bold; }
    .btn-ws-tabla { display: inline-block; background: #25d366; color: white !important; text-decoration: none; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-left: 8px; }

    @media screen and (max-width: 600px) {
      table, thead, tbody, th, td, tr { display: block; width: 100%; }
      thead { display: none; }
      tr { border-bottom: 2px solid #f28c28; padding: 15px 0; background: #fff; }
      td { border: none; padding: 4px 10px; box-sizing: border-box; }
      .btn-ws-tabla { display: block; text-align: center; margin-top: 10px; padding: 10px; }
    }
  </style>
</head>
<body>

<div class="container">
  <img src="logo-musical.png" alt="Musical da Capo" class="logo">
  <h1>Musical da Capo</h1>
  <div class="subtitle">Tu tienda de Música en Córdoba</div>

  <div id="main-content">
    <div class="stock-container">
      <div class="stock-title">🔎 CONSULTAR STOCK DISPONIBLE</div>
      
      <input type="text" id="buscador" placeholder="Escribe castañuelas, guitarra, funda..." oninput="generarSugerencias()">
      <div id="contenedor-sugerencias"></div>
      
      <div style="margin-bottom: 15px; font-size: 14px; color: #555;">
        <label style="cursor:pointer; display: flex; align-items: center; gap: 8px;">
          <input type="checkbox" id="soloStock" onclick="filtrarStock()"> Mostrar solo productos con stock
        </label>
      </div>

      <div class="tabla-wrapper">
        <table id="tablaStock">
          <thead>
            <tr>
              <th>Código</th>
              <th>Producto</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="cuerpoTabla"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
 let productos = [];

 function normalizarTexto(texto) {
    if (!texto) return "";
    return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
 }

 // Carga del CSV
 fetch('stock.csv')
    .then(response => response.arrayBuffer())
    .then(buffer => {
      const decoder = new TextDecoder('iso-8859-1');
      const data = decoder.decode(buffer);
      const filas = data.trim().split('\n').slice(1);
      productos = filas.map(f => {
        const c = f.split(',');
        if (c.length >= 3) {
          return { 
            codigo: c[0].replace(/"/g, '').trim(), 
            nombre: c[1].replace(/"/g, '').trim(), 
            stock: parseInt(c[2]) || 0
          };
        }
        return null;
      }).filter(p => p && p.nombre);
    });

 function generarSugerencias() {
    const input = normalizarTexto(document.getElementById('buscador').value.trim());
    const contenedor = document.getElementById('contenedor-sugerencias');
    
    if (input.length < 2) {
        contenedor.style.display = 'none';
        return;
    }

    // 1. Buscamos todas las primeras palabras de productos que coincidan con lo que escribes
    let mapaSugerencias = {};
    
    productos.forEach(p => {
        const nombreNorm = normalizarTexto(p.nombre);
        if (nombreNorm.includes(input)) {
            // Extraemos la palabra que coincide o la primera palabra significativa
            const palabras = p.nombre.split(" ");
            const palabraClave = palabras[0].toUpperCase(); // Usamos la primera palabra (ej. CASTAÑUELAS)
            
            if (!mapaSugerencias[palabraClave]) {
                mapaSugerencias[palabraClave] = 0;
            }
            mapaSugerencias[palabraClave]++;
        }
    });

    // 2. Convertimos el mapa en una lista y ordenamos por las que tienen más resultados
    const sugerenciasOrdenadas = Object.keys(mapaSugerencias)
        .sort((a, b) => mapaSugerencias[b] - mapaSugerencias[a])
        .slice(0, 3); // Mostramos solo las 3 mejores palabras clave

    if (sugerenciasOrdenadas.length > 0) {
        contenedor.style.display = 'block';
        contenedor.innerHTML = sugerenciasOrdenadas.map(word => `
            <div class="sugerencia-item">
                <span>Ver todos los resultados para: <strong>${word}</strong></span>
                <button class="btn-buscar-sug" onclick="aplicarBusquedaSugerida('${word}')">BUSCAR ESTO (${mapaSugerencias[word]})</button>
            </div>
        `).join('');
    } else {
        contenedor.style.display = 'none';
    }
 }

 function aplicarBusquedaSugerida(termino) {
    document.getElementById('buscador').value = termino;
    document.getElementById('contenedor-sugerencias').style.display = 'none';
    filtrarStock(); 
 }

 function filtrarStock() {
    const busquedaOriginal = document.getElementById('buscador').value.trim();
    const soloDisponibles = document.getElementById('soloStock').checked;
    const busquedaLimpia = normalizarTexto(busquedaOriginal);
    
    if(busquedaLimpia === "") { renderTabla([]); return; }

    // Filtrado que permite encontrar el término en cualquier parte del nombre
    let filtrados = productos.filter(p => {
        const nombreNorm = normalizarTexto(p.nombre);
        const codNorm = normalizarTexto(p.codigo);
        const tieneStock = soloDisponibles ? p.stock > 0 : true;
        
        return (nombreNorm.includes(busquedaLimpia) || codNorm.includes(busquedaLimpia)) && tieneStock;
    });

    renderTabla(filtrados);
 }

 function renderTabla(lista) {
    const cuerpo = document.getElementById('cuerpoTabla');
    if (lista.length === 0) {
      cuerpo.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px; color:#888;">No hay resultados. Prueba con otra palabra.</td></tr>';
      return;
    }

    cuerpo.innerHTML = lista.map(p => {
      let clase = 'rojo', texto = 'Agotado';
      if (p.stock > 5) { clase = 'verde'; texto = 'Disponible'; }
      else if (p.stock > 0) { clase = 'amarillo'; texto = 'Últimas unidades'; }
      const mensajeWA = encodeURIComponent(`Hola, me interesa: ${p.nombre} (Ref: ${p.codigo}).`);
      return `<tr><td>${p.codigo}</td><td>${p.nombre}</td><td><span class="${clase}">${texto}</span> <a href="https://wa.me/34695908361?text=${mensajeWA}" target="_blank" class="btn-ws-tabla">WhatsApp</a></td></tr>`;
    }).join('');
 }
</script>
</body>
</html>
